<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <script>
    if (window.self !== window.top) document.documentElement.classList.add('embedded');
  </script>
  <!-- Critical inline CSS so the loading screen paints on the very first
       frame, before styles.css has a chance to load. -->
  <style>
    html, body { margin: 0; padding: 0; background: #000; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter,
      Roboto, "Helvetica Neue", Arial, sans-serif; }
    #game-loading {
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px;
      transition: opacity 0.4s ease;
    }
    #game-loading.hidden { opacity: 0; pointer-events: none; }
    #game-loading .gl-icon {
      font-size: 96px; line-height: 1;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4));
      animation: gl-breathe 2.4s ease-in-out infinite;
    }
    #game-loading .gl-bar {
      position: relative; width: 180px; height: 4px;
      background: rgba(255,255,255,0.22); border-radius: 999px;
      overflow: hidden;
    }
    #game-loading .gl-bar::after {
      content: ""; position: absolute; top: 0; left: -40%;
      width: 40%; height: 100%;
      background: rgba(255,255,255,0.95); border-radius: inherit;
      animation: gl-bar 1.2s cubic-bezier(0.45,0,0.55,1) infinite;
    }
    @keyframes gl-breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    @keyframes gl-bar { 0% { left: -40%; } 100% { left: 100%; } }
  </style>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="game-loading">
    <span class="gl-icon" aria-hidden="true">#️⃣</span>
    <div class="gl-bar" aria-label="Loading"></div>
  </div>

  <div class="aurora" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <main class="card">
    <header class="header">
      <a class="back-link" href="../../">←</a>
      <span class="badge">tic-tac-toe</span>
      <span class="header-spacer" aria-hidden="true"></span>
    </header>

    <div class="status" id="status">X to play</div>

    <div class="board" id="board" role="grid" aria-label="Tic-tac-toe board">
      <button class="cell" data-i="0" type="button" aria-label="Cell 1"></button>
      <button class="cell" data-i="1" type="button" aria-label="Cell 2"></button>
      <button class="cell" data-i="2" type="button" aria-label="Cell 3"></button>
      <button class="cell" data-i="3" type="button" aria-label="Cell 4"></button>
      <button class="cell" data-i="4" type="button" aria-label="Cell 5"></button>
      <button class="cell" data-i="5" type="button" aria-label="Cell 6"></button>
      <button class="cell" data-i="6" type="button" aria-label="Cell 7"></button>
      <button class="cell" data-i="7" type="button" aria-label="Cell 8"></button>
      <button class="cell" data-i="8" type="button" aria-label="Cell 9"></button>
    </div>

    <div class="scoreboard">
      <div class="stat"><span class="stat-label">X</span><span class="stat-value" id="score-x">0</span></div>
      <div class="stat"><span class="stat-label">Draw</span><span class="stat-value" id="score-d">0</span></div>
      <div class="stat"><span class="stat-label">O</span><span class="stat-value" id="score-o">0</span></div>
    </div>

    <div class="actions">
      <button id="reset-btn" type="button">New round</button>
      <button id="clear-btn" class="ghost" type="button">Reset scores</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
