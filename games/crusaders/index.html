<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Crusaders</title>
  <script>
    if (window.self !== window.top) document.documentElement.classList.add('embedded');
  </script>
  <!-- Critical inline CSS so the loading splash paints on the very first
       frame, before styles.css resolves. (mandatory pattern) -->
  <style>
    html, body { margin: 0; padding: 0; background: #2b1d12; color: #f3e3c3;
      font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      overflow: hidden; height: 100%; }
    #game-loading {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(circle at 50% 38%, #5a4326 0%, #2b1d12 70%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 22px;
      transition: opacity 0.45s ease;
    }
    #game-loading.hidden { opacity: 0; pointer-events: none; }
    #game-loading .gl-icon { font-size: 84px; line-height: 1;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.45)); }
    #game-loading .gl-title { font-size: 22px; letter-spacing: 3px;
      text-transform: uppercase; color: #e7b85b; font-weight: 700; }
    #game-loading .gl-bar { position: relative; width: 180px; height: 4px;
      background: rgba(231,184,91,0.18); overflow: hidden; border-radius: 2px; }
    #game-loading .gl-bar::after { content: ""; position: absolute; top: 0; left: -40%;
      width: 40%; height: 100%; background: #e7b85b;
      animation: gl-bar 1.2s cubic-bezier(0.45,0,0.55,1) infinite; }
    @keyframes gl-bar { 0% { left: -40%; } 100% { left: 100%; } }
  </style>
  <link rel="stylesheet" href="styles.css?v=520adbf" />
</head>
<body>
  <div id="game-loading">
    <span class="gl-icon" aria-hidden="true">🏰</span>
    <span class="gl-title">Crusaders</span>
    <div class="gl-bar" aria-label="Loading"></div>
  </div>

  <main class="stage">
    <canvas id="map" aria-label="Castle map. Drag to pan, pinch to zoom."></canvas>

    <!-- Top HUD: resources -->
    <header class="hud" id="hud">
      <div class="res"><span class="res-i">🪙</span><span id="r-gold">200</span></div>
      <div class="res"><span class="res-i">🍞</span><span id="r-food">85</span></div>
      <div class="res"><span class="res-i">🪵</span><span id="r-wood">40</span></div>
      <div class="res"><span class="res-i">🧑‍🌾</span><span id="r-pop">24</span></div>
    </header>

    <!-- Selection / info readout -->
    <div class="tip" id="tip" aria-live="polite"></div>

    <!-- Placement banner (shown while building) -->
    <div class="place-banner" id="place-banner">
      <span id="place-text">Tap a tile to build</span>
      <button id="place-cancel" type="button">✕ Done</button>
    </div>

    <!-- On-screen joystick (toggled in the menu) -->
    <div class="joystick" id="joystick" aria-hidden="true">
      <div class="joystick-knob" id="joystick-knob"></div>
    </div>

    <!-- Bottom controls -->
    <nav class="controls" id="controls">
      <button class="ctl" id="menu-btn" type="button" aria-label="Menu">☰</button>
      <button class="ctl" id="build-btn" type="button" aria-label="Build">🔨</button>
      <button class="ctl" id="center-btn" type="button" aria-label="Center on keep">🏰</button>
      <div class="zoomers">
        <button class="ctl" id="zout-btn" type="button" aria-label="Zoom out">−</button>
        <button class="ctl" id="zin-btn" type="button" aria-label="Zoom in">+</button>
      </div>
    </nav>

    <!-- Build sheet -->
    <div class="build-sheet" id="build-sheet" data-open="false">
      <div class="build-head">
        <span>Build</span>
        <button id="build-close" type="button" aria-label="Close build menu">✕</button>
      </div>
      <div class="build-list" id="build-list"><!-- options injected by app.js --></div>
    </div>

    <!-- Menu overlay -->
    <div class="overlay" id="overlay" data-state="title">
      <div class="panel">
        <div class="crest" aria-hidden="true">🏰</div>
        <h1 class="title">Stronghold<br><span>Crusaders</span></h1>
        <p class="blurb" id="overlay-blurb">A seeded, endless desert. Your keep sits at the heart of it — drag to roam the wilderness in any direction, pinch to zoom, tap anything to inspect it.</p>
        <div class="seed-row">
          <span class="seed-label">Seed</span>
          <code id="seed-val">—</code>
          <button id="reroll-btn" type="button" class="mini">🎲 New world</button>
        </div>
        <label class="toggle-row" for="joy-toggle">
          <span>On-screen joystick</span>
          <input type="checkbox" id="joy-toggle" class="toggle" />
        </label>
        <div class="menu-actions">
          <button id="play-btn" type="button" class="primary">Enter the Holding</button>
          <button id="how-btn" type="button" class="ghost">How to play</button>
          <button id="quit-btn" type="button" class="ghost">Quit</button>
        </div>
        <p class="proto-note">Prototype · map + touch controls + menu</p>
      </div>
    </div>
  </main>

  <script src="app.js?v=520adbf"></script>
</body>
</html>
