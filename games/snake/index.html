<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <script>
    if (window.self !== window.top) document.documentElement.classList.add('embedded');
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <main class="card">
    <header class="header">
      <a class="back-link" href="../../">←</a>
      <span class="badge">snake</span>
      <span class="header-spacer" aria-hidden="true"></span>
    </header>

    <div class="scoreboard">
      <div class="stat">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="score">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Best</span>
        <span class="stat-value" id="best">0</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="game" width="480" height="480" aria-label="Snake game board"></canvas>
      <div class="overlay" id="overlay" data-state="ready">
        <h2 id="overlay-title">Snake</h2>
        <p id="overlay-text">Eat the glowing dots. Don't bite yourself.</p>
        <button id="action-btn" type="button">Start</button>
      </div>
    </div>

    <div class="controls-hint">
      <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> or <kbd>WASD</kbd> to move &nbsp;·&nbsp;
      <kbd>Space</kbd> to pause &nbsp;·&nbsp; <kbd>Enter</kbd> to restart
    </div>
    <div class="touch-hint">Swipe to move &nbsp;·&nbsp; tap to pause</div>
  </main>

  <script src="app.js"></script>
</body>
</html>
