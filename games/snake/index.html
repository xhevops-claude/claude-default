<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <script>
    if (window.self !== window.top) document.documentElement.classList.add('embedded');
  </script>
  <!-- Critical inline CSS so the loading screen paints on the very first
       frame, before styles.css has a chance to load. -->
  <style>
    html, body { margin: 0; padding: 0; background: #000; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter,
      Roboto, "Helvetica Neue", Arial, sans-serif; }
    #game-loading {
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px;
      transition: opacity 0.4s ease;
    }
    #game-loading.hidden { opacity: 0; pointer-events: none; }
    #game-loading .gl-icon {
      font-size: 96px; line-height: 1;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4));
      animation: gl-breathe 2.4s ease-in-out infinite;
    }
    #game-loading .gl-bar {
      position: relative; width: 180px; height: 4px;
      background: rgba(255,255,255,0.22); border-radius: 999px;
      overflow: hidden;
    }
    #game-loading .gl-bar::after {
      content: ""; position: absolute; top: 0; left: -40%;
      width: 40%; height: 100%;
      background: rgba(255,255,255,0.95); border-radius: inherit;
      animation: gl-bar 1.2s cubic-bezier(0.45,0,0.55,1) infinite;
    }
    @keyframes gl-breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    @keyframes gl-bar { 0% { left: -40%; } 100% { left: 100%; } }
  </style>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="game-loading">
    <span class="gl-icon" aria-hidden="true">🐍</span>
    <div class="gl-bar" aria-label="Loading"></div>
  </div>

  <div class="aurora" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <main class="card">
    <header class="header">
      <a class="back-link" href="../../">←</a>
      <span class="badge">snake</span>
      <span class="header-spacer" aria-hidden="true"></span>
    </header>

    <div class="scoreboard">
      <div class="stat">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="score">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Best</span>
        <span class="stat-value" id="best">0</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="game" width="480" height="480" aria-label="Snake game board"></canvas>
      <div class="overlay" id="overlay" data-state="ready">
        <h2 id="overlay-title">Snake</h2>
        <p id="overlay-text">Eat the glowing dots. Don't bite yourself.</p>
        <button id="action-btn" type="button">Start</button>
      </div>
    </div>

    <div class="controls-hint">
      <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> or <kbd>WASD</kbd> to move &nbsp;·&nbsp;
      <kbd>Space</kbd> to pause &nbsp;·&nbsp; <kbd>Enter</kbd> to restart
    </div>
    <div class="touch-hint">Swipe to move &nbsp;·&nbsp; tap to pause</div>
  </main>

  <script src="app.js"></script>
</body>
</html>
