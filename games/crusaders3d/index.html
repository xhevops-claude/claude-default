<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Crusaders 3D</title>
  <script>
    if (window.self !== window.top) document.documentElement.classList.add('embedded');
  </script>
  <!-- Critical inline CSS so the splash paints on the first frame, before
       styles.css and the (large) three.js download resolve. -->
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #1c130b;
      color: #f3e3c3; font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      overflow: hidden; }
    #game-loading {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(circle at 50% 38%, #5a4326 0%, #1c130b 70%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 22px; transition: opacity 0.45s ease;
    }
    #game-loading.hidden { opacity: 0; pointer-events: none; }
    #game-loading .gl-icon { font-size: 84px; line-height: 1;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.45)); }
    #game-loading .gl-title { font-size: 22px; letter-spacing: 3px;
      text-transform: uppercase; color: #e7b85b; font-weight: 700; }
    #game-loading .gl-bar { position: relative; width: 180px; height: 4px;
      background: rgba(231,184,91,0.18); overflow: hidden; border-radius: 2px; }
    #game-loading .gl-bar::after { content: ""; position: absolute; top: 0; left: -40%;
      width: 40%; height: 100%; background: #e7b85b;
      animation: gl-bar 1.2s cubic-bezier(0.45,0,0.55,1) infinite; }
    @keyframes gl-bar { 0% { left: -40%; } 100% { left: 100%; } }
  </style>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="game-loading">
    <span class="gl-icon" aria-hidden="true">🏯</span>
    <span class="gl-title">Crusaders 3D</span>
    <div class="gl-bar" aria-label="Loading"></div>
  </div>

  <canvas id="scene"></canvas>

  <!-- Resource HUD (DOM overlay; mirrors the 2D game's saved resources) -->
  <header class="hud" id="hud">
    <div class="res"><span class="res-i">🪙</span><span id="r-gold">200</span></div>
    <div class="res"><span class="res-i">🍞</span><span id="r-food">85</span></div>
    <div class="res"><span class="res-i">💧</span><span id="r-water">30</span></div>
    <div class="res"><span class="res-i">🪵</span><span id="r-wood">40</span></div>
    <div class="res"><span class="res-i">🪨</span><span id="r-stone">0</span></div>
    <div class="res"><span class="res-i">⚙️</span><span id="r-iron">0</span></div>
    <div class="res"><span class="res-i">🍺</span><span id="r-ale">0</span></div>
    <div class="res"><span class="res-i">⚔️</span><span id="r-weapons">0</span></div>
    <div class="res"><span class="res-i">🛡️</span><span id="r-army">0</span></div>
    <div class="res"><span class="res-i">😊</span><span id="r-popularity">50</span></div>
    <div class="res"><span class="res-i">🧑‍🌾</span><span id="r-pop">24</span></div>
  </header>

  <button id="quit-btn" type="button">Quit</button>
  <p class="hint" id="hint">Left-click select · left-drag move · right-drag rotate · wheel zoom</p>

  <div class="obj-tools" id="obj-tools">
    <span class="tool-name" id="tool-name">Structure</span>
    <button id="tool-move" type="button">↔ Move</button>
    <button id="tool-rotate" type="button">⟳ Rotate</button>
    <button id="tool-dupe" type="button">⧉ Copy</button>
    <button id="tool-delete" type="button" class="danger">🗑 Delete</button>
  </div>

  <nav class="controls" id="controls">
    <button class="ctl" id="grid-btn" type="button" aria-label="Toggle grid">#️⃣</button>
    <button class="ctl" id="build-btn" type="button" aria-label="Build">🔨</button>
  </nav>

  <!-- Left tool palette (Paint-style); more tools to come -->
  <nav class="toolbar" id="toolbar">
    <button class="tool" id="lt-select" type="button" title="Select"><span>🖱️</span>Select</button>
    <button class="tool" id="lt-move" type="button" title="Move"><span>✋</span>Move</button>
    <button class="tool" id="lt-delete" type="button" title="Delete"><span>🗑️</span>Delete</button>
  </nav>

  <div class="build-sheet" id="build-sheet" data-open="false">
    <div class="build-head">
      <span>Build</span>
      <button id="build-close" type="button" aria-label="Close build menu">✕</button>
    </div>
    <div class="build-tabs" id="build-tabs"></div>
    <div class="build-list" id="build-list"></div>
  </div>

  <div class="place-banner" id="place-banner">
    <span id="place-text">Click the ground to build</span>
    <button id="place-cancel" type="button">✕ Done</button>
  </div>

  <!-- three.js r136 classic (global THREE) + OrbitControls, so app.js stays a
       plain script. CDN-pinned URLs are left untouched by the deploy rewrite. -->
  <script src="https://unpkg.com/three@0.136.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.136.0/examples/js/controls/OrbitControls.js"></script>
  <script src="app.js"></script>
</body>
</html>
