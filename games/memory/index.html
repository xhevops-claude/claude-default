<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Memory</title>
  <script>
    if (window.self !== window.top) document.documentElement.classList.add('embedded');
  </script>
  <!-- Critical inline CSS so the loading screen paints on the first
       frame, before styles.css resolves. -->
  <style>
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      background:
        radial-gradient(120% 80% at 50% -10%, #1b2a4a 0%, #0c1220 55%, #06080f 100%);
      color: #f4f3ee;
      font-family: -apple-system, "SF Pro Display", "Helvetica Neue",
        system-ui, "Segoe UI", Roboto, Arial, sans-serif;
    }
    #game-loading {
      position: fixed; inset: 0; z-index: 9999;
      background:
        radial-gradient(120% 80% at 50% -10%, #1b2a4a 0%, #0c1220 55%, #06080f 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px;
      transition: opacity 0.4s ease;
    }
    #game-loading.hidden { opacity: 0; pointer-events: none; }
    #game-loading .gl-icon {
      font-size: 88px; line-height: 1;
      filter: drop-shadow(0 6px 20px rgba(212, 175, 55, 0.35));
    }
    #game-loading .gl-title {
      font-size: 22px; letter-spacing: 0.22em; text-transform: uppercase;
      color: #d4af37; opacity: 0.9;
    }
    #game-loading .gl-bar {
      position: relative; width: 200px; height: 3px;
      background: rgba(212, 175, 55, 0.18); overflow: hidden;
      border-radius: 999px;
    }
    #game-loading .gl-bar::after {
      content: ""; position: absolute; top: 0; left: -40%;
      width: 40%; height: 100%; background: #d4af37;
      animation: gl-bar 1.2s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    }
    @keyframes gl-bar { 0% { left: -40%; } 100% { left: 100%; } }
  </style>
  <link rel="stylesheet" href="styles.css?v=f9cceba" />
</head>
<body>
  <div id="game-loading">
    <span class="gl-icon" aria-hidden="true">🐾</span>
    <span class="gl-title">Memory</span>
    <div class="gl-bar" aria-label="Loading"></div>
  </div>

  <main class="stage">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">🐾</span>
        <span class="brand-name">Memory</span>
        <span class="brand-sub">Wildlife</span>
      </div>
      <button id="quit-btn" class="icon-btn" type="button" aria-label="Quit">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" fill="none" />
        </svg>
      </button>
    </header>

    <div class="controls">
      <div class="diff-picker" id="diff-picker" role="tablist" aria-label="Difficulty">
        <span class="diff-indicator" id="diff-indicator" aria-hidden="true"></span>
        <button class="diff-btn" data-diff="easy"   type="button" role="tab">Easy</button>
        <button class="diff-btn" data-diff="medium" type="button" role="tab">Medium</button>
        <button class="diff-btn" data-diff="hard"   type="button" role="tab">Hard</button>
        <button class="diff-btn" data-diff="expert" type="button" role="tab">Expert</button>
      </div>
      <button id="new-game-btn" class="ghost-btn" type="button">New game</button>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-label">Moves</span>
        <span class="stat-value" id="stat-moves">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Time</span>
        <span class="stat-value" id="stat-time">0:00</span>
      </div>
      <div class="stat">
        <span class="stat-label">Pairs</span>
        <span class="stat-value" id="stat-pairs">0 / 0</span>
      </div>
      <div class="stat best">
        <span class="stat-label">Best</span>
        <span class="stat-value" id="stat-best">—</span>
      </div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board" aria-label="Memory board"></div>
    </div>

    <div class="win-overlay" id="win-overlay" hidden>
      <div class="win-card">
        <div class="win-emoji" id="win-emoji" aria-hidden="true">🦁</div>
        <h2 class="win-title">You found them all</h2>
        <p class="win-sub" id="win-sub"></p>
        <p class="win-best" id="win-best"></p>
        <div class="win-actions">
          <button id="play-again-btn" type="button" class="primary-btn">Play again</button>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js?v=f9cceba"></script>
</body>
</html>
