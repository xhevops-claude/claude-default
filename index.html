<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Arcade</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('arcade-theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="themes.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <main class="page">
    <header class="hero">
      <div class="hero-top">
        <span class="badge">arcade</span>
        <div class="theme-picker" role="group" aria-label="Theme">
          <button class="swatch" data-theme="dark"      type="button" aria-label="Dark theme"></button>
          <button class="swatch" data-theme="light"     type="button" aria-label="Light theme"></button>
          <button class="swatch" data-theme="space"     type="button" aria-label="Space theme"></button>
          <button class="swatch" data-theme="sunset"    type="button" aria-label="Sunset theme"></button>
          <button class="swatch" data-theme="mono"      type="button" aria-label="Mono theme"></button>
          <button class="swatch" data-theme="solarized" type="button" aria-label="Solarized theme"></button>
          <button class="swatch" data-theme="gameboy"   type="button" aria-label="Game Boy theme"></button>
        </div>
      </div>
      <h1 class="title">Pick a game</h1>
      <p class="subtitle">Tap a tile to play.</p>
    </header>

    <ul id="grid" class="grid" role="list"></ul>

    <footer class="foot">Built for fun. More games coming.</footer>
  </main>

  <div id="game-overlay" class="game-overlay" hidden>
    <div id="frame-wrap" class="frame-wrap">
      <iframe id="game-frame" title="Game" src="about:blank"></iframe>
      <div id="frame-skin" class="frame-skin" aria-hidden="true">
        <div class="skin-art">
          <span class="skin-icon" id="skin-icon">🎮</span>
        </div>
        <div class="skin-body">
          <h2 class="skin-title" id="skin-title"></h2>
          <p class="skin-tagline" id="skin-tagline"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="theme.js"></script>
  <script src="app.js"></script>
</body>
</html>
