<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Arcade</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <main class="page">
    <header class="hero">
      <div class="hero-top">
        <span class="badge">arcade</span>
        <button id="theme-btn" class="ghost" type="button" aria-label="Toggle theme">🌗</button>
      </div>
      <h1 class="title">Pick a game</h1>
      <p class="subtitle">A small home for the games we build here.</p>

      <div class="search-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="search" type="search" placeholder="Search games or tags…" autocomplete="off" />
        <span class="count" id="count" aria-live="polite"></span>
      </div>
    </header>

    <ul id="grid" class="grid" role="list"></ul>

    <p id="empty" class="empty" hidden>No games match that search.</p>

    <footer class="foot">
      Built for fun. More games coming.
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
