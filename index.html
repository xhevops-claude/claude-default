<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Arcade</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <main class="page">
    <header class="hero">
      <div class="hero-top">
        <span class="badge">arcade</span>
        <button id="theme-btn" class="ghost" type="button" aria-label="Toggle theme">🌗</button>
      </div>
      <h1 class="title">Pick a game</h1>
      <p class="subtitle">Tap a tile to play.</p>
    </header>

    <ul id="grid" class="grid" role="list"></ul>

    <footer class="foot">Built for fun. More games coming.</footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
