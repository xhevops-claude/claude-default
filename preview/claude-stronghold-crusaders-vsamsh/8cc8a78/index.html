<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcade</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('arcade-theme');
        var valid = ['noir', 'bone', 'steel', 'jade', 'ember'];
        if (!t || valid.indexOf(t) === -1) {
          t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'bone' : 'noir';
        }
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="themes.css?v=8cc8a78" />
  <link rel="stylesheet" href="styles.css?v=8cc8a78" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">Arcade</span>
    </div>
    <div class="theme-picker" role="group" aria-label="Theme">
      <button class="swatch" data-theme="noir"  type="button" aria-label="Noir theme"></button>
      <button class="swatch" data-theme="bone"  type="button" aria-label="Bone theme"></button>
      <button class="swatch" data-theme="steel" type="button" aria-label="Steel theme"></button>
      <button class="swatch" data-theme="jade"  type="button" aria-label="Jade theme"></button>
      <button class="swatch" data-theme="ember" type="button" aria-label="Ember theme"></button>
    </div>
  </header>

  <main class="pager" id="pager">
    <section class="page" data-page="home" aria-labelledby="title-home">
      <div class="page-head">
        <h1 class="page-title" id="title-home">Home</h1>
        <span class="page-meta">Welcome</span>
      </div>
      <div class="hero">
        <span class="hero-icon" aria-hidden="true">🕹️</span>
        <p class="hero-title">Arcade</p>
        <p class="hero-text">Swipe to switch sections</p>
      </div>
    </section>

    <section class="page" data-page="apps" aria-labelledby="title-apps">
      <div class="page-head">
        <h1 class="page-title" id="title-apps">Apps</h1>
        <span class="page-meta" id="apps-meta"></span>
      </div>
      <ul id="apps-grid" class="grid" role="list"></ul>
    </section>

    <section class="page" data-page="tools" aria-labelledby="title-tools">
      <div class="page-head">
        <h1 class="page-title" id="title-tools">Tools</h1>
        <span class="page-meta">Coming soon</span>
      </div>
      <div class="empty">
        <span class="empty-icon" aria-hidden="true">🛠️</span>
        <p class="empty-title">Nothing here yet</p>
        <p class="empty-text">Utilities will live here</p>
      </div>
    </section>

    <section class="page" data-page="games" aria-labelledby="title-games">
      <div class="page-head">
        <h1 class="page-title" id="title-games">Games</h1>
        <span class="page-meta" id="page-meta"></span>
      </div>
      <ul id="grid" class="grid" role="list"></ul>
    </section>
  </main>

  <nav class="pager-nav" id="pager-nav" aria-label="Sections">
    <button class="pager-nav-btn pager-nav-prev" id="nav-prev" type="button"></button>
    <span class="pager-nav-current" id="nav-current" aria-live="polite"></span>
    <button class="pager-nav-btn pager-nav-next" id="nav-next" type="button"></button>
  </nav>

  <footer class="footbar">
    <span>Built for fun</span>
    <span id="foot-meta"></span>
  </footer>

  <div id="game-overlay" class="game-overlay" hidden>
    <div id="frame-wrap" class="frame-wrap">
      <iframe id="game-frame" title="Game" src="about:blank" allow="geolocation"></iframe>
      <div id="frame-skin" class="frame-skin" aria-hidden="true">
        <div class="skin-art">
          <span class="skin-icon" id="skin-icon">🎮</span>
        </div>
        <div class="skin-body">
          <h2 class="skin-title" id="skin-title"></h2>
          <p class="skin-tagline" id="skin-tagline"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="theme.js?v=8cc8a78"></script>
  <script src="app.js?v=8cc8a78"></script>
</body>
</html>
