<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcade</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('arcade-theme');
        var valid = ['noir', 'bone', 'steel', 'jade', 'ember'];
        if (!t || valid.indexOf(t) === -1) {
          t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'bone' : 'noir';
        }
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="themes.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">Arcade</span>
    </div>
    <div class="theme-picker" role="group" aria-label="Theme">
      <button class="swatch" data-theme="noir"  type="button" aria-label="Noir theme"></button>
      <button class="swatch" data-theme="bone"  type="button" aria-label="Bone theme"></button>
      <button class="swatch" data-theme="steel" type="button" aria-label="Steel theme"></button>
      <button class="swatch" data-theme="jade"  type="button" aria-label="Jade theme"></button>
      <button class="swatch" data-theme="ember" type="button" aria-label="Ember theme"></button>
    </div>
  </header>

  <main class="page">
    <div class="page-head">
      <h1 class="page-title">Games</h1>
      <span class="page-meta" id="page-meta"></span>
    </div>
    <ul id="grid" class="grid" role="list"></ul>
  </main>

  <footer class="footbar">
    <span>Built for fun</span>
    <span id="foot-meta"></span>
  </footer>

  <div id="game-overlay" class="game-overlay" hidden>
    <div id="frame-wrap" class="frame-wrap">
      <iframe id="game-frame" title="Game" src="about:blank"></iframe>
      <div id="frame-skin" class="frame-skin" aria-hidden="true">
        <div class="skin-art">
          <span class="skin-icon" id="skin-icon">🎮</span>
        </div>
        <div class="skin-body">
          <h2 class="skin-title" id="skin-title"></h2>
          <p class="skin-tagline" id="skin-tagline"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="theme.js"></script>
  <script src="app.js"></script>
</body>
</html>
