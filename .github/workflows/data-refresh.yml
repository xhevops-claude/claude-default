name: Refresh data

# Daily fetch of upstream open datasets. Each file under
# `data-sources/` declares one type of data; this workflow reads them,
# downloads the listed assets, and publishes them to the live site
# under `/cdn/<type>/` on the `gh-pages` branch.
#
# Currently handles:
#   - data-sources/maps-osm.txt  →  cdn/maps/osm/<slug>.osm.pbf
#
# Extending: add a new file under data-sources/ and a matching step
# below.

on:
  schedule:
    # 05:30 UTC daily — Geofabrik rebuilds regional extracts around
    # 02:30 UTC; running 3h later means we always pick up that day's
    # snapshot.
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false
        default: 'manual refresh'

permissions:
  contents: write   # peaceiris/actions-gh-pages pushes to gh-pages

# Don't fight the deploy workflow over gh-pages writes.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Bring gh-pages into the local git db so we can read the
      # currently-published md5 sidecars with `git show` instead of
      # HTTP. HTTP would race against Pages republishing the branch
      # (~30–90s lag) and miss the file we just pushed last run.
      - name: Fetch gh-pages branch
        run: |
          git fetch --depth=1 origin gh-pages 2>/dev/null \
            && echo "gh-pages fetched" \
            || echo "gh-pages does not exist yet (first run); proceeding."

      - name: Download OSM regional extracts
        id: fetch
        run: |
          set -euo pipefail
          mkdir -p cdn/maps/osm
          any_changed=0

          # Browser-ish UA so Geofabrik's CDN doesn't filter us as a bot.
          UA="Mozilla/5.0 (compatible; claude-default-data-refresh/1.0; +https://github.com/${{ github.repository }})"
          CURL=(curl -fsSL --retry 3 --retry-delay 5 -A "$UA")

          # Read whatever is currently on gh-pages without network
          # roundtrips — the branch state is the source of truth, the
          # public URL is just a delayed reflection of it.
          read_published_md5() {
            local path="$1"
            git show "origin/gh-pages:${path}" 2>/dev/null | awk '{print $1}' || true
          }

          # Sanity-check a downloaded PBF. Catches the failure mode
          # where Geofabrik (or a CDN in front) returns 200 with an
          # HTML index page or a truncated body instead of the binary
          # — both of which md5/checksum logic alone would happily
          # save and ship downstream as a "valid file".
          assert_pbf() {
            local path="$1"
            local size first
            size="$(wc -c < "$path")"
            # OSM PBFs start with a big-endian uint32 length followed
            # by a protobuf BlobHeader. The very first byte is part
            # of that length and is essentially always 0x00 for
            # country-sized files. An HTML response starts with "<".
            first="$(head -c 1 "$path" | od -An -tx1 | tr -d ' \n')"
            if [[ "$first" == "3c" ]]; then
              echo "::error::Downloaded body looks like HTML (starts with '<'), not a PBF. First 200 bytes:"
              head -c 200 "$path" | sed 's/^/  /'
              return 1
            fi
            # Even Liechtenstein's PBF is ~500 KB. Anything under
            # 100 KB for a country extract is almost certainly a
            # mistake (404 page, soft redirect, partial transfer).
            if (( size < 102400 )); then
              echo "::error::Downloaded file is suspiciously small (${size} bytes). Aborting."
              return 1
            fi
            echo "PBF looks valid: ${size} bytes."
          }

          while IFS= read -r raw || [[ -n "$raw" ]]; do
            line="${raw%%#*}"
            line="$(echo "$line" | xargs || true)"
            [[ -z "$line" ]] && continue
            slug="$(echo "$line" | awk '{print $1}')"
            url="$(echo "$line" | awk '{print $2}')"
            if [[ -z "$slug" || -z "$url" ]]; then
              echo "::warning::Skipping malformed line: $raw"
              continue
            fi

            echo "::group::$slug"

            # Upstream checksum — Geofabrik publishes <pbf>.md5 next to
            # every extract. Tiny, definitive, and treated as required:
            # if it isn't there, the URL is wrong (or Geofabrik is
            # broken) and we should NOT fall back to "trust whatever
            # bytes we got" because that's exactly how an HTML index
            # page got shipped as a PBF.
            upstream_md5="$("${CURL[@]}" "${url}.md5" 2>/dev/null | awk '{print $1}' || true)"
            if [[ -z "$upstream_md5" || ! "$upstream_md5" =~ ^[0-9a-f]{32}$ ]]; then
              echo "::error::No valid upstream MD5 for $slug at ${url}.md5 — refusing to download. Either the URL is wrong or Geofabrik is unreachable."
              exit 1
            fi

            # Last-published checksum sits on gh-pages; read directly
            # from the branch (no HTTP propagation race).
            local_md5="$(read_published_md5 "cdn/maps/osm/${slug}.osm.pbf.md5")"

            if [[ "$upstream_md5" == "$local_md5" ]]; then
              echo "Up to date (MD5 $upstream_md5). Skipping."
              echo "::endgroup::"
              continue
            fi

            echo "Fetching $url"
            target="cdn/maps/osm/${slug}.osm.pbf"
            "${CURL[@]}" -o "$target" "$url"

            # Defensive check: did we actually get a PBF, or HTML /
            # truncated junk masquerading as one?
            assert_pbf "$target"

            # MD5 must match upstream — guards against mid-flight
            # rebuilds and any silent corruption on the wire.
            actual="$(md5sum "$target" | awk '{print $1}')"
            if [[ "$actual" != "$upstream_md5" ]]; then
              echo "::error::MD5 mismatch for $slug: expected $upstream_md5, got $actual"
              exit 1
            fi

            # Sidecar in `md5sum`-compatible format so the next run
            # can diff it directly.
            echo "${upstream_md5}  $(basename "$target")" > "${target}.md5"

            ls -lh "$target"
            any_changed=1
            echo "::endgroup::"
          done < data-sources/maps-osm.txt

          echo "any_changed=$any_changed" >> "$GITHUB_OUTPUT"
          if [[ "$any_changed" == "0" ]]; then
            echo "::notice title=No changes::All regions already up to date upstream."
          fi

      - name: Publish /cdn/ to gh-pages
        if: steps.fetch.outputs.any_changed == '1'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cdn
          publish_branch: gh-pages
          destination_dir: cdn
          keep_files: true
          commit_message: 'data: refresh ${{ github.event.inputs.reason || ''scheduled'' }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Print served URLs
        if: steps.fetch.outputs.any_changed == '1'
        run: |
          echo "::notice title=Data published::https://xhevops-claude.github.io/claude-default/cdn/maps/osm/"
          if [[ -d cdn/maps/osm ]]; then
            for f in cdn/maps/osm/*.osm.pbf; do
              [[ -e "$f" ]] || continue
              name="$(basename "$f")"
              echo "  https://xhevops-claude.github.io/claude-default/cdn/maps/osm/$name"
            done
          fi
